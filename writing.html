<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {{
      font-family: 'Inter', sans-serif;
      background-color: #0d0d0d;
      color: white;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="2" cy="2" r="1" fill="white" opacity="0.3"/><circle cx="30" cy="50" r="1" fill="white" opacity="0.2"/></svg>');
    }}
    .post {{
      background-color: rgba(255,255,255,0.05);
      padding: 2rem;
      margin-bottom: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 10px #3df2dc;
    }}
  </style>
</head>
<body class="p-6">
  <header class="text-center mb-8">
    <h1 class="text-4xl font-display text-neon">Writing</h1>
    <p class="text-pink-400">Explorations, reflections, and thoughts.</p>
  </header>
  <main id="posts" class="max-w-4xl mx-auto"></main>

  <script>
    const posts = ["desolina-ep.md"];
    const container = document.getElementById('posts');

    posts.forEach(filename => {{
      fetch('posts/' + filename)
        .then(res => res.text())
        .then(data => {{
          const meta = /---([\s\S]*?)---/.exec(data);
          const content = data.replace(/---([\s\S]*?)---/, '').trim();
          const title = /title:\s*(.*)/.exec(meta[1])[1];
          const date = /date:\s*(.*)/.exec(meta[1])[1];

          const html = `
            <article class="post">
              <h2 class="text-2xl font-bold text-pinky mb-2">${{title}}</h2>
              <p class="text-sm text-gray-400 mb-4">${{date}}</p>
              <div class="prose prose-invert max-w-none">${{marked.parse(content)}}</div>
            </article>
          `;
          container.innerHTML += html;
        }});
    }});
  </script>
</body>
</html>
